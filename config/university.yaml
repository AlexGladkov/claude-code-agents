university:
  name: "AI University"
  description: "Университет с AI-преподавателями. Расширяемая структура: факультеты, кафедры, дисциплины."

  faculties:
    - id: medicine
      title: "Медицинский факультет"
      description: "Фундаментальная и клиническая медицина"

      departments:
        - id: biology
          title: "Кафедра биологии"
          description: "Биологические науки для медиков"
          head: department-head
          head-file: agents/education/biology/department-head.md

          disciplines:
            - name: anatomy-teacher
              title: "Анатомия человека"
              description: "Системная, клиническая и топографическая анатомия, рентгенанатомия, эмбриология"
              agent-file: agents/education/biology/anatomy-teacher.md
              hours: 120
              competencies:
                - "Знание анатомической терминологии (рус + лат)"
                - "Описание строения органов и систем"
                - "Топографические отношения структур"
                - "Клинические корреляции анатомических знаний"
                - "Чтение анатомических атласов и рентгенограмм"

            - name: physiology-teacher
              title: "Физиология человека"
              description: "Нормальная физиология всех систем организма"
              agent-file: agents/education/biology/physiology-teacher.md
              hours: 140
              competencies:
                - "Понимание механизмов регуляции функций"
                - "Интерпретация физиологических показателей"
                - "Объяснение патофизиологических процессов"
                - "Расчёт физиологических параметров"

            - name: neurobiology-teacher
              title: "Нейробиология"
              description: "Клеточная и системная нейробиология"
              agent-file: agents/education/biology/neurobiology-teacher.md
              hours: 100
              competencies:
                - "Понимание нейронных механизмов"
                - "Синаптическая передача и пластичность"
                - "Сенсорные и моторные системы"
                - "Основы нейрофармакологии"
                - "Высшие функции мозга"

    - id: ai-ml
      title: "Факультет AI/ML"
      description: "Искусственный интеллект и машинное обучение — от промптинга до продакшена"

      departments:
        - id: ai-sdlc
          title: "Кафедра AI SDLC"
          description: "Полный цикл разработки AI-систем: от проектирования до деплоя и мониторинга"
          head: ai-sdlc-department-head
          head-file: agents/education/ai-ml/ai-sdlc/department-head.md

          disciplines:
            - name: prompting-teacher
              title: "Промптинг, State & Context Management"
              description: "Prompt engineering, управление состоянием и контекстным окном LLM"
              agent-file: agents/education/ai-ml/ai-sdlc/prompting-teacher.md
              hours: 80
              competencies:
                - "Написание эффективных системных промптов"
                - "Chain-of-thought и few-shot стратегии"
                - "Управление контекстным окном"
                - "State management в мультитурновых диалогах"
                - "Оценка и итерация промптов"

            - name: mcp-teacher
              title: "Model Context Protocol"
              description: "MCP — серверы, инструменты, ресурсы, транспорты, интеграция с LLM"
              agent-file: agents/education/ai-ml/ai-sdlc/mcp-teacher.md
              hours: 60
              competencies:
                - "Архитектура MCP (клиент-сервер)"
                - "Создание MCP-серверов и инструментов"
                - "Ресурсы и промпт-шаблоны MCP"
                - "Транспорты (stdio, SSE, Streamable HTTP)"
                - "Интеграция MCP с AI-агентами"

            - name: rag-teacher
              title: "RAG & Embeddings"
              description: "Retrieval-Augmented Generation, embedding-модели, vector DB, retrieval-стратегии"
              agent-file: agents/education/ai-ml/ai-sdlc/rag-teacher.md
              hours: 80
              competencies:
                - "Архитектура RAG-пайплайнов"
                - "Chunking-стратегии и препроцессинг"
                - "Embedding-модели и similarity search"
                - "Vector databases (Chroma, Pinecone, Weaviate)"
                - "Re-ranking и гибридный поиск"
                - "Оценка качества retrieval"

            - name: local-ai-teacher
              title: "Local AI"
              description: "Локальный деплой моделей — Ollama, llama.cpp, vLLM, квантизация, hardware"
              agent-file: agents/education/ai-ml/ai-sdlc/local-ai-teacher.md
              hours: 60
              competencies:
                - "Развёртывание моделей локально (Ollama, llama.cpp)"
                - "Квантизация моделей (GGUF, GPTQ, AWQ)"
                - "Выбор hardware под задачу (GPU/CPU/Apple Silicon)"
                - "Serving с vLLM и TGI"
                - "Оптимизация инференса"

            - name: ai-security-teacher
              title: "AI Security"
              description: "Безопасность AI-систем — prompt injection, guardrails, red teaming, OWASP LLM Top 10"
              agent-file: agents/education/ai-ml/ai-sdlc/ai-security-teacher.md
              hours: 60
              competencies:
                - "OWASP LLM Top 10"
                - "Prompt injection и jailbreak-атаки"
                - "Guardrails и фильтрация"
                - "Red teaming AI-систем"
                - "Data poisoning и supply chain"
                - "Privacy и PII в LLM"

            - name: cv-teacher
              title: "Computer Vision"
              description: "Компьютерное зрение — CNN, детекция, сегментация, OCR, vision-language модели"
              agent-file: agents/education/ai-ml/ai-sdlc/cv-teacher.md
              hours: 80
              competencies:
                - "Архитектуры CNN (ResNet, EfficientNet, ViT)"
                - "Object detection (YOLO, DETR)"
                - "Семантическая и instance сегментация"
                - "OCR и документ-процессинг"
                - "Vision-Language модели (GPT-4V, Claude Vision)"
                - "Препроцессинг и аугментация данных"

            - name: ai-agents-teacher
              title: "AI Agents"
              description: "Мультиагентные системы — tool use, планирование, ReAct, оркестрация, memory"
              agent-file: agents/education/ai-ml/ai-sdlc/ai-agents-teacher.md
              hours: 80
              competencies:
                - "Архитектура AI-агентов"
                - "Tool use и function calling"
                - "Паттерны: ReAct, Plan-and-Execute, Reflection"
                - "Мультиагентная оркестрация"
                - "Memory и персистентность"
                - "Evaluation и debugging агентов"

            - name: mlops-teacher
              title: "MLOps"
              description: "ML Operations — model serving, мониторинг, drift detection, пайплайны, CI/CD для моделей"
              agent-file: agents/education/ai-ml/ai-sdlc/mlops-teacher.md
              hours: 60
              competencies:
                - "Model serving (FastAPI, Triton, BentoML)"
                - "A/B тестирование моделей"
                - "Мониторинг и drift detection"
                - "ML-пайплайны (Airflow, Prefect, Kubeflow)"
                - "CI/CD для моделей"
                - "Model registry и версионирование"

        - id: ml-foundations
          title: "Кафедра AI/ML Foundations"
          description: "Фундаментальные основы машинного обучения: от классических алгоритмов до генеративных моделей и RL"
          head: ml-foundations-department-head
          head-file: agents/education/ai-ml/ml-foundations/department-head.md

          disciplines:
            - name: classical-ml-teacher
              title: "Классический ML"
              description: "Классические алгоритмы ML — SVM, деревья, ансамбли, кластеризация, feature engineering"
              agent-file: agents/education/ai-ml/ml-foundations/classical-ml-teacher.md
              hours: 100
              competencies:
                - "SVM и kernel-методы"
                - "Деревья решений и ансамбли (XGBoost, CatBoost, Random Forest)"
                - "Кластеризация (K-Means, DBSCAN, hierarchical)"
                - "Dimensionality reduction (PCA, t-SNE, UMAP)"
                - "Feature engineering и pipelines"

            - name: deep-learning-teacher
              title: "Нейросети и глубокое обучение"
              description: "Архитектуры нейросетей, backpropagation, оптимизация, CNN, transfer learning"
              agent-file: agents/education/ai-ml/ml-foundations/deep-learning-teacher.md
              hours: 100
              competencies:
                - "Backpropagation и вычислительные графы"
                - "Активации, инициализация, BatchNorm, dropout"
                - "CNN архитектуры (ResNet, U-Net, EfficientNet)"
                - "Оптимизаторы (Adam, SGD, LAMB) и LR schedules"
                - "Transfer learning и fine-tuning"

            - name: transformers-teacher
              title: "Encoder/Decoder и трансформеры"
              description: "Seq2seq, attention, Transformer, BERT/GPT/T5, токенизация, scaling laws"
              agent-file: agents/education/ai-ml/ml-foundations/transformers-teacher.md
              hours: 80
              competencies:
                - "Seq2seq и механизмы attention (Bahdanau, Luong)"
                - "Архитектура Transformer (encoder/decoder)"
                - "BERT, GPT, T5 — encoder-only, decoder-only, encoder-decoder"
                - "Positional encoding и токенизация (BPE, SentencePiece)"
                - "Scaling laws и эмерджентные свойства"

            - name: fuzzy-logic-teacher
              title: "Нечёткая логика и нейро-фаззи"
              description: "Fuzzy sets, нечёткий вывод, ANFIS, нейро-фаззи гибриды, нечёткие контроллеры"
              agent-file: agents/education/ai-ml/ml-foundations/fuzzy-logic-teacher.md
              hours: 60
              competencies:
                - "Нечёткие множества и функции принадлежности"
                - "Нечёткий вывод (Mamdani, Sugeno)"
                - "ANFIS и нейро-фаззи гибриды"
                - "Нечёткие контроллеры"
                - "Decision making с нечёткой логикой"

            - name: optimization-teacher
              title: "Оптимизация и теория обучения"
              description: "Convex/non-convex оптимизация, регуляризация, PAC-learning, теория обобщения"
              agent-file: agents/education/ai-ml/ml-foundations/optimization-teacher.md
              hours: 80
              competencies:
                - "Convex и non-convex оптимизация"
                - "SGD convergence и варианты"
                - "Регуляризация (L1/L2/Elastic Net)"
                - "Bias-variance tradeoff"
                - "PAC-learning, VC-dimension, generalization bounds"

            - name: generative-models-teacher
              title: "Генеративные модели"
              description: "VAE, GAN, Diffusion models, Flow-based models, autoregressive модели"
              agent-file: agents/education/ai-ml/ml-foundations/generative-models-teacher.md
              hours: 80
              competencies:
                - "VAE — архитектура, ELBO, reparameterization trick"
                - "GAN (DCGAN, StyleGAN, WGAN) — обучение, mode collapse"
                - "Diffusion models (DDPM, Stable Diffusion, score matching)"
                - "Flow-based models (RealNVP, Glow)"
                - "Autoregressive модели"

            - name: reinforcement-learning-teacher
              title: "Reinforcement Learning"
              description: "MDP, Q-learning, policy gradient, PPO, Actor-Critic, RLHF, multi-agent RL"
              agent-file: agents/education/ai-ml/ml-foundations/reinforcement-learning-teacher.md
              hours: 80
              competencies:
                - "MDP, Bellman equation, Q-learning, DQN"
                - "Policy gradient и REINFORCE"
                - "PPO и Actor-Critic"
                - "RLHF — обучение с обратной связью от человека"
                - "Multi-agent RL и sim-to-real"

            - name: rnn-timeseries-teacher
              title: "Рекуррентные сети и временные ряды"
              description: "RNN, LSTM, GRU, Temporal Fusion Transformer, forecasting, anomaly detection"
              agent-file: agents/education/ai-ml/ml-foundations/rnn-timeseries-teacher.md
              hours: 60
              competencies:
                - "RNN, LSTM, GRU — архитектура и обучение"
                - "Temporal Fusion Transformer"
                - "Time series forecasting"
                - "Sequence labeling"
                - "Anomaly detection во временных рядах"

            - name: graph-nn-teacher
              title: "Графовые нейросети"
              description: "GNN, GCN, GAT, message passing, knowledge graphs, молекулярный ML"
              agent-file: agents/education/ai-ml/ml-foundations/graph-nn-teacher.md
              hours: 60
              competencies:
                - "GNN, GCN, GAT, GraphSAGE"
                - "Message passing и агрегация"
                - "Node/edge/graph classification"
                - "Knowledge graphs и link prediction"
                - "Молекулярный ML"

    - id: robotics
      title: "Факультет робототехники"
      description: "Робототехника — от фундаментальных основ до автономных систем и симуляции"

      departments:
        - id: robot-fundamentals
          title: "Кафедра основ робототехники"
          description: "Фундаментальные дисциплины: механика, электроника, управление, математика"
          head: robot-fundamentals-department-head
          head-file: agents/education/robotics/fundamentals/department-head.md

          disciplines:
            - name: kinematics-dynamics-teacher
              title: "Кинематика и динамика роботов"
              description: "Прямая/обратная кинематика, динамические модели, манипуляторы, мобильные платформы"
              agent-file: agents/education/robotics/fundamentals/kinematics-dynamics-teacher.md
              hours: 80
              competencies:
                - "Прямая и обратная кинематика (DH-параметры)"
                - "Динамика манипуляторов (Лагранж, Ньютон-Эйлер)"
                - "Якобианы и сингулярности"
                - "Кинематика мобильных роботов (дифференциальный, омни, Аккерман)"
                - "Планирование траекторий в пространстве сочленений"

            - name: sensors-actuators-teacher
              title: "Сенсоры и актуаторы"
              description: "Датчики, приводы, энкодеры, IMU, лидары, сенсорная фузия"
              agent-file: agents/education/robotics/fundamentals/sensors-actuators-teacher.md
              hours: 60
              competencies:
                - "Типы сенсоров (проприоцептивные, экстероцептивные)"
                - "Лидары, камеры, ультразвук, IMU, энкодеры"
                - "Электроприводы (DC, BLDC, серво, шаговые)"
                - "Сенсорная фузия (Kalman filter, EKF, UKF)"
                - "Калибровка сенсоров"

            - name: control-systems-teacher
              title: "Системы управления"
              description: "PID, state-space, адаптивное и робастное управление роботами"
              agent-file: agents/education/robotics/fundamentals/control-systems-teacher.md
              hours: 80
              competencies:
                - "PID-регуляторы и настройка"
                - "Пространство состояний и наблюдаемость"
                - "LQR и оптимальное управление"
                - "Адаптивное и робастное управление"
                - "Управление в реальном времени"

            - name: electronics-mcu-teacher
              title: "Электроника и микроконтроллеры"
              description: "Схемотехника, микроконтроллеры (STM32, ESP32, Arduino), протоколы, питание"
              agent-file: agents/education/robotics/fundamentals/electronics-mcu-teacher.md
              hours: 80
              competencies:
                - "Основы схемотехники для робототехники"
                - "Микроконтроллеры (STM32, ESP32, Arduino)"
                - "Протоколы (I2C, SPI, UART, CAN)"
                - "Силовая электроника и управление моторами"
                - "Проектирование PCB для роботов"

            - name: robot-math-teacher
              title: "Математика для робототехники"
              description: "Линейная алгебра, кватернионы, теория вероятностей, оптимизация для робототехники"
              agent-file: agents/education/robotics/fundamentals/robot-math-teacher.md
              hours: 60
              competencies:
                - "Матрицы поворота и однородные преобразования"
                - "Кватернионы и представления ориентации"
                - "Вероятностная робототехника (байесовские фильтры)"
                - "Оптимизация (нелинейная, выпуклая)"
                - "Дифференциальная геометрия для робототехники"

        - id: applied-robotics
          title: "Кафедра прикладной робототехники"
          description: "Практическое применение: ROS, зрение, навигация, SLAM, симуляция"
          head: applied-robotics-department-head
          head-file: agents/education/robotics/applied/department-head.md

          disciplines:
            - name: ros2-teacher
              title: "ROS 2"
              description: "Robot Operating System 2 — ноды, топики, сервисы, actions, launch, lifecycle, DDS"
              agent-file: agents/education/robotics/applied/ros2-teacher.md
              hours: 80
              competencies:
                - "Архитектура ROS 2 (DDS, nodes, topics, services)"
                - "Actions, lifecycle nodes, parameters"
                - "Launch-файлы и конфигурация"
                - "Navigation2 stack"
                - "Пакеты, colcon, CI/CD для ROS 2"

            - name: robot-vision-teacher
              title: "Компьютерное зрение для роботов"
              description: "Стереозрение, калибровка, детекция объектов, визуальная одометрия, 3D-реконструкция"
              agent-file: agents/education/robotics/applied/robot-vision-teacher.md
              hours: 80
              competencies:
                - "Калибровка камер и стереозрение"
                - "Детекция и трекинг объектов в реальном времени"
                - "Визуальная одометрия (VO)"
                - "3D-реконструкция и point clouds"
                - "Depth estimation и RGB-D"

            - name: motion-planning-teacher
              title: "Планирование движения и навигация"
              description: "Path planning, motion planning, obstacle avoidance, costmaps, поведенческое планирование"
              agent-file: agents/education/robotics/applied/motion-planning-teacher.md
              hours: 80
              competencies:
                - "Алгоритмы поиска пути (A*, RRT, PRM, D*)"
                - "Motion planning для манипуляторов (MoveIt)"
                - "Obstacle avoidance и costmaps"
                - "Поведенческое планирование (behavior trees, FSM)"
                - "Multi-robot coordination"

            - name: slam-teacher
              title: "SLAM и картография"
              description: "Simultaneous Localization and Mapping — визуальный, лидарный, гибридный SLAM"
              agent-file: agents/education/robotics/applied/slam-teacher.md
              hours: 60
              competencies:
                - "Основы SLAM (фронтенд/бэкенд, loop closure)"
                - "Лидарный SLAM (Cartographer, LOAM)"
                - "Визуальный SLAM (ORB-SLAM, VINS)"
                - "Graph-based SLAM и factor graphs"
                - "Построение и использование карт (occupancy grid, 3D)"

            - name: simulation-teacher
              title: "Симуляция и цифровые двойники"
              description: "Gazebo, Isaac Sim, MuJoCo, цифровые двойники, sim-to-real transfer"
              agent-file: agents/education/robotics/applied/simulation-teacher.md
              hours: 60
              competencies:
                - "Gazebo и Ignition — моделирование и физика"
                - "NVIDIA Isaac Sim и Omniverse"
                - "MuJoCo для ML и RL в робототехнике"
                - "URDF/SDF — описание роботов"
                - "Sim-to-real transfer и domain randomization"

  # Межфакультетские программы
  cross-faculty-programs: []
